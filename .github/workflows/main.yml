name: Build and Push OmniTalk Agent

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Necessário para construir imagens para outras arquiteturas (como AMD64)
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          # Esta linha abaixo corrige o erro de formato nos logs do Pipecat
          platforms: linux/amd64
          push: true
          # Usando o nome exatamente como aparece no seu perfil
          tags: ghcr.io/crislimapy/omnitalk-agent:v2
